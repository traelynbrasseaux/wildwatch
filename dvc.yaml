stages:
  download:
    cmd: python -m src.data.download --params params.yaml
    deps:
      - src/data/download.py
    params:
      - seed
      - dataset
      - paths.raw_dir
    outs:
      - data/raw

  preprocess:
    cmd: python -m src.data.preprocess --params params.yaml
    deps:
      - src/data/preprocess.py
      - data/raw
    params:
      - seed
      - preprocess
      - paths.processed_dir
    outs:
      - data/processed

  validate:
    cmd: python -m src.data.validate --params params.yaml --report reports/data_validation.json
    deps:
      - src/data/validate.py
      - data/processed
    params:
      - validate
      - paths.processed_dir
    outs:
      - reports/data_validation.json:
          cache: false

  train:
    cmd: python -m src.training.train --params params.yaml
    deps:
      - src/training/train.py
      - src/training/config.py
      - src/training/model.py
      - src/training/evaluate.py
      - data/processed
      - reports/data_validation.json
    params:
      - seed
      - training
      - paths.models_dir
      - paths.reports_dir
    outs:
      - models/model.pt
      - models/train_summary.json:
          cache: false
    metrics:
      - reports/test_metrics.json:
          cache: false
    plots:
      - reports/confusion_matrix.png:
          cache: false
