name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install CPU PyTorch
        # PyTorch wheels are large; use the official CPU-only index to keep CI fast.
        run: |
          pip install --index-url https://download.pytorch.org/whl/cpu \
            "torch>=2.2,<2.5" "torchvision>=0.17,<0.20"

      - name: Install project + dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check src tests scripts

      - name: Mypy (type check)
        run: mypy src

      - name: Pytest
        # Sanity-inference test is skipped in CI because it needs a registered
        # production model; it is exercised in the retrain workflow instead.
        run: pytest tests/ -v --deselect tests/test_sanity_inference.py
